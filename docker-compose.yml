version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vyom_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./logistics_platform.db
      - DEBUG=False
      - PROJECT_NAME=Sanchar AI OS
      - API_V1_STR=/api/v1
    volumes:
      - ./backend:/app/backend
    restart: always

  frontend:
    image: node:18-alpine
    container_name: vyom_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
      - NEXT_PUBLIC_SUPABASE_URL=https://rptzwafoadnkdyyuvslm.supabase.co
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    restart: always
